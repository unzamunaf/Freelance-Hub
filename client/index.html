<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreelanceHub | Premium Freelance Services</title>
    <meta name="description" content="Browse, save, and hire top-tier freelance services for your business.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">FreelanceHub</div>
        <nav>
            <ul>
                <li><a href="#" onclick="showSection('home')">Home</a></li>
                <li><a href="#" onclick="showSection('services')">Services</a></li>
                <li><a href="#" onclick="showSection('dashboard')">Dashboard</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home-section" class="section hero">
            <h1>Find the Perfect Freelance <br><span style="color: var(--primary)">Service for Your Business</span></h1>
            <p>Premium quality, global talent, and secure collaboration.</p>
            <br>
            <button class="btn btn-primary" onclick="showSection('services')">Explore Services</button>
        </section>

        <section id="services-section" class="section container" style="display: none;">
            <div class="controls">
                <input type="text" id="search-input" placeholder="Search services..." oninput="handleFilter()">
                <select id="category-filter" onchange="handleFilter()">
                    <option value="">All Categories</option>
                    <option value="Design">Design</option>
                    <option value="Tech">Tech</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Writing">Writing</option>
                    <option value="Video">Video</option>
                </select>
                <select id="sort-filter" onchange="handleFilter()">
                    <option value="default">Sort By</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="rating">Top Rated</option>
                </select>
            </div>

            <div id="services-grid" class="services-grid">
            </div>
        </section>

        <section id="dashboard-section" class="section container" style="display: none;">
            <h2>User Dashboard</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem;">
                <div>
                    <h3>Saved Services</h3>
                    <div id="drop-save" class="drop-zone" ondrop="drop(event, 'save')" ondragover="allowDrop(event)">
                        Drag here to Save
                    </div>
                    <div id="saved-list" class="services-grid" style="margin-top: 1rem; grid-template-columns: 1fr;"></div>
                </div>
                <div>
                    <h3>Hired Services</h3>
                    <div id="drop-hire" class="drop-zone" ondrop="drop(event, 'hire')" ondragover="allowDrop(event)">
                        Drag here to Hire
                    </div>
                    <div id="hired-list" class="services-grid" style="margin-top: 1rem; grid-template-columns: 1fr;"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="service-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
